<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>&#24555;&#25463;&#37749;&#35386;&#26039;</title>
<style>
body{font-family:-apple-system,sans-serif;padding:24px;background:#f2f2f7;}
h2{font-size:17px;margin-bottom:16px;}
#log{background:#fff;border-radius:12px;padding:16px;font-size:13px;min-height:200px;white-space:pre-wrap;border:1px solid #ddd;font-family:monospace;line-height:1.8;}
.btn{display:block;width:100%;padding:14px;margin:8px 0;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;}
.b1{background:#007AFF;color:#fff;}
.b2{background:#34C759;color:#fff;}
.b3{background:#FF9500;color:#fff;}
p{font-size:13px;color:#666;margin:8px 0;}
</style>
</head>
<body>
<h2>&#24555;&#25463;&#37749;&#35386;&#26039;&#24037;&#20855;</h2>
<p>&#35531;&#29992;&#34253;&#29273;&#37749;&#30436;&#25353;&#19979;&#20219;&#24847;&#25353;&#37749;&#65292;&#19979;&#26041;&#26085;&#35468;&#26371;&#39023;&#31034;&#20597;&#28204;&#21040;&#30340;&#36039;&#35338;</p>
<button class="btn b1" onclick="document.getElementById('log').textContent='';log('&#26085;&#35468;&#24050;&#28165;&#38500;')">&#28165;&#38500;&#26085;&#35468;</button>
<button class="btn b2" onclick="testAlt()">&#28204;&#35430;&#65306;&#40670;&#27492;&#24460;&#25353; Alt+N</button>
<button class="btn b3" onclick="document.getElementById('log').textContent+=('shortcuts loaded: '+window._scLoaded+'\nshortcuts count: '+window._scCount+'\n')">&#39023;&#31034; shortcuts &#29376;&#24907;</button>
<div id="log">&#31561;&#24453;&#25353;&#37749;&#36664;&#20837;...
</div>

<script>
window._scLoaded = false;
window._scCount = 0;

function log(msg){
  var el=document.getElementById('log');
  var d=new Date();
  var ts=d.getHours()+':'+d.getMinutes()+':'+d.getSeconds()+'.'+d.getMilliseconds();
  el.textContent=el.textContent+'['+ts+'] '+msg+'\n';
  el.scrollTop=el.scrollHeight;
}

function testAlt(){
  log('&#35531;&#29694;&#22312;&#25353; Alt+N&#65288;Option+N on Mac&#65289;');
}

document.addEventListener('keydown',function(e){
  var ctrl=e.ctrlKey||e.metaKey;
  var info='key="'+e.key+'" code="'+e.code+'" ctrl='+ctrl+' alt='+e.altKey+' shift='+e.shiftKey;
  log('KEYDOWN: '+info);
  if(e.altKey&&e.key.toLowerCase()==='n'){
    log('>>> ALT+N &#20597;&#28204;&#25104;&#21151;&#65281;');
    e.preventDefault();
  }
},{passive:false});

document.addEventListener('keyup',function(e){
  if(e.altKey||e.key==='Alt'){
    log('keyup: key="'+e.key+'"');
  }
});

log('&#33139;&#26412;&#36617;&#20837;&#23436;&#25104;&#65292;&#35531;&#38283;&#22987;&#28204;&#35430;');
window._scLoaded=true;
window._scCount=999;
</script>
</body>
</html>
