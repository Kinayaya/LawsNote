}

function typeByKey(k){for(var i=0;i<types.length;i++){if(types[i].key===k)return types[i];}return {key:k,label:k,color:'#888'};}
function subByKey(k){for(var i=0;i<subjects.length;i++){if(subjects[i].key===k)return subjects[i];}return {key:k,label:k,color:'#888'};}

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g2=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return [r,g2,b];
}
function lightColor(hex){
  var rgb=hexToRgb(hex);
  return 'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+',0.12)';
}
function darkColor(hex){
  var rgb=hexToRgb(hex);
  return 'rgb('+Math.round(rgb[0]*0.55)+','+Math.round(rgb[1]*0.55)+','+Math.round(rgb[2]*0.55)+')';
}

function highlight(text, q){
  if(!q)return text;
  var idx=text.toLowerCase().indexOf(q.toLowerCase());
  if(idx===-1)return text;
  return text.slice(0,idx)+'<span class="hl">'+text.slice(idx,idx+q.length)+'</span>'+text.slice(idx+q.length);
}

function buildTypeRow(){
  var row=g('typeRow');
  var btns='<button class="tab '+(cv==='all'?'on':'')+'" data-v="all" style="'+(cv==='all'?'background:#555;':'')+'">&#20840;&#37096;</button>';
  for(var i=0;i<types.length;i++){
    var t=types[i];
    var on=cv===t.key;
    btns+='<button class="tab '+(on?'on':'')+'" data-v="'+t.key+'" style="'+(on?'background:'+t.color+';':'')+'">'+(on?'&#10003; ':'')+t.label+'</button>';
  }
  btns+='<button class="tab tag-mgr-btn" id="tagMgrBtn">&#9881; &#31649;&#29702;&#27161;&#31844;</button>';
  row.innerHTML=btns;
  var tabs=row.querySelectorAll('.tab[data-v]');
  for(var j=0;j<tabs.length;j++){
    (function(btn){btn.addEventListener('click',function(){
      cv=btn.getAttribute('data-v');
      buildTypeRow();render();
    });})(tabs[j]);
  }
  var mb=g('tagMgrBtn');
  if(mb)mb.addEventListener('click',function(){openTagMgr();});
}

function buildSubRow(){
  var row=g('subbar');
  var html='<button class="sc '+(cs==='all'?'on':'')+'" data-s="all" style="'+(cs==='all'?'background:#555;color:#fff;border-color:#555;':'')+'">&#20840;&#37096;&#31185;&#30446;</button>';
  for(var i=0;i<subjects.length;i++){
    var s=subjects[i];
    var on=cs===s.key;
    html+='<button class="sc '+(on?'on':'')+'" data-s="'+s.key+'" style="'+(on?'background:'+s.color+';color:#fff;border-color:'+s.color+';':'')+'">'+s.label+'</button>';
  }
  row.innerHTML=html;
  var scs=row.querySelectorAll('.sc');
  for(var j=0;j<scs.length;j++){
    (function(btn){btn.addEventListener('click',function(){
      cs=btn.getAttribute('data-s');
      buildSubRow();render();
    });})(scs[j]);
  }
}

function buildFormSelects(){
  var ft=g('ft'),fs2=g('fs2');
  ft.innerHTML=types.map(function(t){return '<option value="'+t.key+'">'+t.label+'</option>';}).join('');
  fs2.innerHTML=subjects.map(function(s){return '<option value="'+s.key+'">'+s.label+'</option>';}).join('');
}

function render(){
  var q=searchQ.trim().toLowerCase();
  var f=notes.filter(function(n){
    if(cv!=='all'&&n.type!==cv)return false;
    if(cs!=='all'&&n.subject!==cs)return false;
    if(q){
      var hay=(n.title+' '+n.body+' '+n.subject+' '+n.tags.join(' ')).toLowerCase();
      if(hay.indexOf(q)===-1)return false;
    }
    return true;
  });
  var sb=g('search-results-bar');
  if(q){
    sb.style.display='block';
    sb.textContent='\u641c\u5c0b\u300c'+searchQ+'\u300d\uff1a\u627e\u5230 '+f.length+' \u7b46\u7b46\u8a18';
  } else {
    sb.style.display='none';
  }
  var grid=g('grid');
  if(!f.length){grid.innerHTML='<div class="empty">\u6c92\u6709\u7b26\u5408\u7684\u7b46\u8a18</div>';return;}
  grid.innerHTML=f.map(function(n){
    var tp=typeByKey(n.type);
    var sb2=subByKey(n.subject);
    var chips=n.tags.slice(0,2).map(function(t){
      return '<span class="chip">'+highlight(t,q)+'</span>';
    }).join('');
    var titleHl=highlight(n.title,q);
    return '<div class="card" data-id="'+n.id+'">'+
      '<div class="cbar" style="background:'+tp.color+'"></div>'+
      '<div class="ctop">'+
        '<span class="ctag" style="background:'+tp.color+'">'+tp.label+'</span>'+
        '<span class="cdate">'+n.date+'</span>'+
      '</div>'+
      '<div class="ctitle">'+titleHl+'</div>'+
      '<div class="cbody">'+n.body+'</div>'+
      '<div class="cfoot">'+
        '<span class="chip" style="background:'+lightColor(sb2.color)+';color:'+darkColor(sb2.color)+';border-color:'+lightColor(sb2.color)+'">'+sb2.label+'</span>'+
        chips+
      '</div></div>';
  }).join('');
  var cards=grid.querySelectorAll('.card');
  for(var i=0;i<cards.length;i++){
    (function(c){c.addEventListener('click',function(){openNote(parseInt(c.getAttribute('data-id')));});})(cards[i]);
  }
}

function openNote(id){
  var n=null;for(var i=0;i<notes.length;i++){if(notes[i].id===id){n=notes[i];break;}}
  if(!n)return;
  openId=id;
  var tp=typeByKey(n.type);
  var sb=subByKey(n.subject);
  g('dp-badge').textContent=tp.label;
  g('dp-badge').style.background=tp.color;
  g('dp-title').textContent=n.title;
  g('dp-body').textContent=n.body;
  g('dp-detail').textContent=n.detail||'\uff08\u5c1a\u7121\u8a73\u7d30\u7b46\u8a18\uff09';
  var c='<span class="chip" style="background:'+lightColor(sb.color)+';color:'+darkColor(sb.color)+';border-color:'+lightColor(sb.color)+'">'+sb.label+'</span>';
  for(var k=0;k<n.tags.length;k++)c+='<span class="chip">'+n.tags[k]+'</span>';
  g('dp-chips').innerHTML=c;
  g('dp').classList.add('open');
  g('fp').classList.remove('open');
  g('tp').classList.remove('open');
  setTimeout(function(){g('dp').scrollIntoView({behavior:'smooth',block:'nearest'});},60);
}

function closeDetail(){g('dp').classList.remove('open');openId=null;}

function openForm(isEdit){
  editMode=isEdit||false;
  buildFormSelects();
  if(editMode){
    var n=null;for(var i=0;i<notes.length;i++){if(notes[i].id===openId){n=notes[i];break;}}
    if(!n)return;
    g('form-title').textContent='\u7de8\u8f2f\u7b46\u8a18';
    g('ft').value=n.type;
    g('fs2').value=n.subject;
    g('fti').value=n.title;
    g('fbo').value=n.body;
    g('fde').value=n.detail||'';
    g('fta').value=n.tags.join(', ');
  } else {
    g('form-title').textContent='\u65b0\u589e\u7b46\u8a18';
    g('fti').value='';g('fbo').value='';g('fde').value='';g('fta').value='';
  }
  g('fp').classList.add('open');
  g('dp').classList.remove('open');
  g('tp').classList.remove('open');
  setTimeout(function(){g('fp').scrollIntoView({behavior:'smooth',block:'nearest'});},60);
}

function closeForm(){g('fp').classList.remove('open');}

function saveNote(){
  var title=(g('fti').value||'').replace(/^ +| +$/g,'');
  if(!title){g('fti').style.borderColor='#FF3B30';showToast('\u8acb\u8f38\u5165\u6a19\u984c');return;}
  g('fti').style.borderColor='';
  var tags=(g('fta').value||'').split(',').map(function(t){return t.replace(/^ +| +$/g,'');}).filter(Boolean);
  if(editMode&&openId){
    for(var i=0;i<notes.length;i++){
      if(notes[i].id===openId){
        notes[i].type=g('ft').value; notes[i].subject=g('fs2').value;
        notes[i].title=title; notes[i].body=(g('fbo').value||'').replace(/^ +| +$/g,'');
        notes[i].detail=(g('fde').value||'').replace(/^ +| +$/g,'');
        notes[i].tags=tags; break;
      }
    }
    saveData();closeForm();render();showToast('\u7b46\u8a18\u5df2\u66f4\u65b0\uff01');
    setTimeout(function(){openNote(openId);},150);
  } else {
    var d=new Date();
    var dt=d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
    notes.unshift({id:nid++,type:g('ft').value,subject:g('fs2').value,title:title,
      body:(g('fbo').value||'').replace(/^ +| +$/g,''),
      detail:(g('fde').value||'').replace(/^ +| +$/g,''),tags:tags,date:dt});
    saveData();closeForm();render();showToast('\u7b46\u8a18\u5df2\u5132\u5b58\uff01');
    setTimeout(function(){window.scrollTo(0,0);setTimeout(function(){openNote(notes[0].id);},300);},100);
  }
}

function deleteNote(){
  if(!openId)return;
  if(!confirm('\u78ba\u5b9a\u522a\u9664\u9019\u7b46\u7b46\u8a18\uff1f'))return;
  notes=notes.filter(function(n){return n.id!==openId;});
  saveData();closeDetail();render();showToast('\u5df2\u522a\u9664');
}

function openTagMgr(){
  g('tp').classList.add('open');
  g('dp').classList.remove('open');
  g('fp').classList.remove('open');
  renderTagLists();
  setTimeout(function(){g('tp').scrollIntoView({behavior:'smooth',block:'nearest'});},60);
}

function renderTagLists(){
  renderTagList('typeTagList', types, 'type');
  renderTagList('subTagList', subjects, 'sub');
}

function renderTagList(containerId, arr, kind){
  var el=g(containerId);
  if(!arr.length){el.innerHTML='<div style="color:#bbb;font-size:13px;padding:8px 0">\uff08\u5c1a\u7121\u6a19\u7c64\uff09</div>';return;}
  el.innerHTML=arr.map(function(item,idx){
    return '<div class="tag-item" data-idx="'+idx+'" data-kind="'+kind+'">'+
      '<div class="tag-color-dot" style="background:'+item.color+'"></div>'+
      '<span class="tag-item-label">'+item.label+'</span>'+
      '<span class="tag-item-key">('+item.key+')</span>'+
      '<button class="tag-edit-btn" data-idx="'+idx+'" data-kind="'+kind+'">\u7de8\u8f2f</button>'+
      '<button class="tag-del-btn" data-idx="'+idx+'" data-kind="'+kind+'">\u522a\u9664</button>'+
      '</div>';
  }).join('');
  var editBtns=el.querySelectorAll('.tag-edit-btn');
  var delBtns=el.querySelectorAll('.tag-del-btn');
  for(var i=0;i<editBtns.length;i++){
    (function(btn){btn.addEventListener('click',function(){
      editTag(parseInt(btn.getAttribute('data-idx')), btn.getAttribute('data-kind'));
    });})(editBtns[i]);
  }
  for(var i=0;i<delBtns.length;i++){
    (function(btn){btn.addEventListener('click',function(){
      deleteTag(parseInt(btn.getAttribute('data-idx')), btn.getAttribute('data-kind'));
    });})(delBtns[i]);
  }
}

function editTag(idx, kind){
  var arr=kind==='type'?types:subjects;
  var item=arr[idx];
  var newLabel=prompt('\u4fee\u6539\u6a19\u7c64\u540d\u7a31\uff1a', item.label);
  if(newLabel===null)return;
  newLabel=newLabel.replace(/^ +| +$/g,'');
  if(!newLabel){showToast('\u6a19\u7c64\u540d\u7a31\u4e0d\u80fd\u70ba\u7a7a');return;}
  var newColor=prompt('\u4fee\u6539\u984f\u8272\uff08\u5341\u516d\u9032\u4f4d\uff0c\u4f8b\uff1a#378ADD\uff09\uff1a', item.color);
  if(newColor===null)return;
  newColor=newColor.replace(/^ +| +$/g,'');
  if(!/^#[0-9A-Fa-f]{6}$/.test(newColor)){showToast('\u984f\u8272\u683c\u5f0f\u4e0d\u6b63\u78ba\uff0c\u8acb\u7528 #RRGGBB \u683c\u5f0f');return;}
  arr[idx].label=newLabel;
  arr[idx].color=newColor;
  saveData();renderTagLists();buildTypeRow();buildSubRow();render();
  showToast('\u6a19\u7c64\u5df2\u66f4\u65b0');
}

function deleteTag(idx, kind){
  var arr=kind==='type'?types:subjects;
  var item=arr[idx];
  if(!confirm('\u78ba\u5b9a\u522a\u9664\u6a19\u7c64\u300c'+item.label+'\u300d\uff1f\u76f8\u95dc\u7b46\u8a18\u4e0d\u6703\u88ab\u522a\u9664\u3002'))return;
  arr.splice(idx,1);
  saveData();renderTagLists();buildTypeRow();buildSubRow();buildFormSelects();render();
  showToast('\u6a19\u7c64\u5df2\u522a\u9664');
}

function addTag(kind){
  var labelId=kind==='type'?'newTypeLabel':'newSubLabel';
  var colorId=kind==='type'?'newTypeColor':'newSubColor';
  var label=(g(labelId).value||'').replace(/^ +| +$/g,'');
  var color=g(colorId).value||'#378ADD';
  if(!label){showToast('\u8acb\u8f38\u5165\u6a19\u7c64\u540d\u7a31');return;}
  var arr=kind==='type'?types:subjects;
  var key=label;
  for(var i=0;i<arr.length;i++){if(arr[i].key===key){showToast('\u6a19\u7c64\u5df2\u5b58\u5728');return;}}
  arr.push({key:key,label:label,color:color});
  g(labelId).value='';
  saveData();renderTagLists();buildTypeRow();buildSubRow();buildFormSelects();
  showToast('\u6a19\u7c64\u5df2\u65b0\u589e\uff01');
}

function exportData(){
  var json=JSON.stringify({notes:notes,nid:nid,types:types,subjects:subjects,exported:new Date().toISOString()},null,2);
  var blob=new Blob([json],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  var d=new Date();
  a.download='\u6cd5\u5f8b\u7b46\u8a18\u5099\u4efd_'+d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate()+'.json';
  a.href=url;a.click();URL.revokeObjectURL(url);
  showToast('\u5df2\u532f\u51fa\uff01\u8acb\u5132\u5b58\u5230 iCloud Drive');
}

function importData(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(!d.notes)throw new Error();
      var existing=notes.map(function(n){return n.id;});
      var added=0;
      for(var i=0;i<d.notes.length;i++){
        if(existing.indexOf(d.notes[i].id)===-1){notes.push(d.notes[i]);added++;if(d.notes[i].id>=nid)nid=d.notes[i].id+1;}
      }
      if(d.types)types=d.types;
      if(d.subjects)subjects=d.subjects;
      notes.sort(function(a,b){return b.id-a.id;});
      saveData();buildTypeRow();buildSubRow();buildFormSelects();render();
      showToast('\u5df2\u532f\u5165 '+added+' \u7b46\u65b0\u7b46\u8a18');
    }catch(ex){showToast('\u532f\u5165\u5931\u6557\uff0c\u8acb\u78ba\u8a8d\u6a94\u6848\u683c\u5f0f');}
  };
  reader.readAsText(file);
}

window.addEventListener('load',function(){
  loadData();
  buildTypeRow();buildSubRow();buildFormSelects();render();

  var si=g('searchInput');
  var sc=g('searchClear');
  si.addEventListener('input',function(){
    searchQ=si.value;
    sc.style.display=searchQ?'block':'none';
    render();
  });
  sc.addEventListener('click',function(){
    si.value='';searchQ='';sc.style.display='none';render();si.focus();
  });

  g('addBtn').addEventListener('click',function(){openForm(false);});
  g('editBtn').addEventListener('click',function(){openForm(true);});
  g('dpClose').addEventListener('click',closeDetail);
  g('fpClose').addEventListener('click',closeForm);
  g('fpCancel').addEventListener('click',closeForm);
  g('fpSave').addEventListener('click',saveNote);
  g('delBtn').addEventListener('click',deleteNote);
  g('exportBtn').addEventListener('click',exportData);
  g('tpClose').addEventListener('click',function(){g('tp').classList.remove('open');});
  g('addTypeBtn').addEventListener('click',function(){addTag('type');});
  g('addSubBtn').addEventListener('click',function(){addTag('sub');});
  g('importFile').addEventListener('change',function(e){
    if(e.target.files&&e.target.files[0])importData(e.target.files[0]);
    e.target.value='';
  });
});
</script>
</body>
</html>
